# Drop this block into your existing nginx config (e.g. /etc/nginx/sites-available/reels)
# Then: sudo ln -s /etc/nginx/sites-available/reels /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;   # ← replace with your domain or VPS IP

    # Increase upload limit for Excel files
    client_max_body_size 50M;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # ── SSE / streaming ──────────────────────────────────────────────────
        # These are critical for the live progress feed to work correctly.
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;           # long timeout for big batches
    }
}
